[build]
  command = "npm run build"
  publish = "out"

[build.environment]
  NODE_VERSION = "18"
  NEXT_TELEMETRY_DISABLED = "1"
  # Desativa o Next.js Runtime do Netlify (serverless SSR).
  # Nosso app usa output: 'export' — arquivo estático, sem servidor.
  NETLIFY_NEXT_PLUGIN_SKIP = "true"

# Cache: estáticos do Next.js ficam para sempre (hash no nome), resto no-cache
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"

# Landing sem .html na URL
[[redirects]]
  from = "/cadastro"
  to = "/mini-landing.html"
  status = 200
