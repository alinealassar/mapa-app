<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=1080"/>
<title>Template Lavanda — @amigadebolso.app</title>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Playfair+Display:ital,wght@1,400&display=swap" rel="stylesheet"/>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{width:1080px;height:1350px;overflow:hidden}
  body{font-family:'Quicksand',sans-serif;background:#E8DDF5;display:flex;flex-direction:column;position:relative}
  /* dots texture */
  body::after{content:'';position:absolute;inset:0;pointer-events:none;z-index:1;background-image:radial-gradient(circle,rgba(142,58,107,0.08) 1px,transparent 1px);background-size:54px 54px}
  .strip{height:24px;background:linear-gradient(90deg,#E8A0BF 0%,#B8A9D4 55%,#5BA67D 100%);flex-shrink:0;position:relative;z-index:2}
  .body{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:80px 96px 48px;gap:0;position:relative;z-index:2}
  .foot{padding:30px 60px 42px;display:flex;justify-content:space-between;align-items:center;position:relative;z-index:2}
  .badge{position:absolute;top:48px;right:42px;font-size:27px;font-weight:700;text-transform:uppercase;color:#fff;background:rgba(142,58,107,0.55);backdrop-filter:blur(4px);padding:9px 27px;border-radius:60px;z-index:3}
  .h3{font-family:'Quicksand',sans-serif;font-weight:700;font-size:72px;line-height:1.3;color:#4A4458}
  .h4{font-family:'Quicksand',sans-serif;font-weight:700;font-size:60px;line-height:1.35;color:#4A4458}
  .sub{font-family:'Quicksand',sans-serif;font-weight:500;font-size:39px;line-height:1.6;color:#4A4458;margin-top:42px}
  .ita{font-family:'Playfair Display',serif;font-style:italic;font-size:48px;line-height:1.5;color:#8E3A6B;margin-top:42px}
  .div{width:108px;height:6px;background:#E8A0BF;border-radius:6px;margin:48px auto}
  .handle{font-size:30px;color:#8B8398;font-weight:500}
  .num{font-size:30px;color:#8B8398;font-weight:700}
  /* lírio botanical */
  .botanical{position:absolute;pointer-events:none;z-index:2;bottom:144px;left:48px}
</style>
</head>
<body>
<div class="strip"></div>
<div class="badge">Single</div>
<div class="body">
  <p class="ita" style="font-size:45px;margin-top:0;margin-bottom:30px">ela disse</p>
  <p class="h3">"Só queria<br>ficar quietinha."</p>
  <div class="div"></div>
  <p class="sub">se você conhece esse sentimento,<br>isso é pra você. 🤍</p>
</div>
<svg class="botanical" width="138" height="186" viewBox="0 0 46 62" fill="none" style="opacity:.28">
  <path d="M23 60 Q23 44 23 28" stroke="#5BA67D" stroke-width="1.3" stroke-linecap="round"/>
  <path d="M23 48 Q12 40 10 30 Q18 40 22 44" stroke="#5BA67D" stroke-width="1.2" fill="rgba(91,166,125,0.18)" stroke-linecap="round"/>
  <path d="M23 28 Q14 14 16 6 Q22 18 23 26" stroke="#B8A9D4" stroke-width="1.2" fill="rgba(184,169,212,0.2)" stroke-linecap="round"/>
  <path d="M23 28 Q32 14 30 6 Q24 18 23 26" stroke="#E8A0BF" stroke-width="1.2" fill="rgba(232,160,191,0.2)" stroke-linecap="round"/>
  <path d="M23 28 Q23 10 21 4 Q24 16 23 26" stroke="#B8A9D4" stroke-width="1.1" fill="rgba(184,169,212,0.15)" stroke-linecap="round"/>
  <circle cx="23" cy="22" r="9" fill="rgba(255,220,100,0.2)" stroke="#E8A0BF" stroke-width="1.1"/>
</svg>
<div class="foot">
  <span class="handle">@amigadebolso.app</span><span class="num">03/30</span>
</div>
</body>
</html>
