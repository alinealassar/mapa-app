<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=1080"/>
<title>Template Rosa Soft — @amigadebolso.app</title>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Playfair+Display:ital,wght@1,400&display=swap" rel="stylesheet"/>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{width:1080px;height:1350px;overflow:hidden}
  body{font-family:'Quicksand',sans-serif;background:#FCE4ED;display:flex;flex-direction:column;position:relative}
  /* dots texture */
  body::after{content:'';position:absolute;inset:0;pointer-events:none;z-index:1;background-image:radial-gradient(circle,rgba(142,58,107,0.10) 1px,transparent 1px);background-size:54px 54px}
  .strip{height:24px;background:linear-gradient(90deg,#E8A0BF 0%,#B8A9D4 55%,#5BA67D 100%);flex-shrink:0;position:relative;z-index:2}
  .body{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:80px 96px 48px;gap:0;position:relative;z-index:2}
  .foot{padding:30px 60px 42px;display:flex;justify-content:space-between;align-items:center;position:relative;z-index:2}
  .badge{position:absolute;top:48px;right:42px;font-size:27px;font-weight:700;text-transform:uppercase;color:#fff;background:rgba(142,58,107,0.55);backdrop-filter:blur(4px);padding:9px 27px;border-radius:60px;z-index:3}
  .h1{font-family:'Quicksand',sans-serif;font-weight:700;font-size:138px;line-height:1;color:#8E3A6B}
  .h2{font-family:'Quicksand',sans-serif;font-weight:700;font-size:108px;line-height:1.15;color:#8E3A6B}
  .h3{font-family:'Quicksand',sans-serif;font-weight:700;font-size:72px;line-height:1.3;color:#8E3A6B}
  .sub{font-family:'Quicksand',sans-serif;font-weight:500;font-size:39px;line-height:1.6;color:#4A4458;margin-top:42px}
  .div{width:108px;height:6px;background:#E8A0BF;border-radius:6px;margin:48px auto}
  .handle{font-size:30px;color:#8B8398;font-weight:500}
  .num{font-size:30px;color:#8B8398;font-weight:700}
  /* margarida botanical */
  .botanical{position:absolute;pointer-events:none;z-index:2;bottom:144px;left:48px}
</style>
</head>
<body>
<div class="strip"></div>
<div class="badge">Single</div>
<div class="body">
  <p class="h2" style="font-size:108px;line-height:1.15">Não é mais<br>uma tarefa.</p>
  <div class="div"></div>
  <p class="h1" style="font-size:138px;line-height:1">É um colo.</p>
</div>
<svg class="botanical" width="156" height="192" viewBox="0 0 52 64" fill="none" style="opacity:.27">
  <path d="M26 62 Q26 48 26 34" stroke="#5BA67D" stroke-width="1.3" stroke-linecap="round"/>
  <path d="M26 52 Q36 46 38 38 Q30 46 27 48" stroke="#5BA67D" stroke-width="1.2" fill="rgba(91,166,125,0.15)" stroke-linecap="round"/>
  <ellipse cx="26" cy="15" rx="3" ry="6.5" fill="rgba(232,160,191,0.22)" stroke="#E8A0BF" stroke-width="1"/>
  <ellipse cx="32" cy="18" rx="3" ry="6.5" fill="rgba(184,169,212,0.22)" stroke="#B8A9D4" stroke-width="1" transform="rotate(60 32 18)"/>
  <ellipse cx="32" cy="26" rx="3" ry="6.5" fill="rgba(232,160,191,0.22)" stroke="#E8A0BF" stroke-width="1" transform="rotate(120 32 26)"/>
  <ellipse cx="26" cy="29" rx="3" ry="6.5" fill="rgba(184,169,212,0.22)" stroke="#B8A9D4" stroke-width="1"/>
  <ellipse cx="20" cy="26" rx="3" ry="6.5" fill="rgba(232,160,191,0.22)" stroke="#E8A0BF" stroke-width="1" transform="rotate(240 20 26)"/>
  <ellipse cx="20" cy="18" rx="3" ry="6.5" fill="rgba(184,169,212,0.22)" stroke="#B8A9D4" stroke-width="1" transform="rotate(300 20 18)"/>
  <circle cx="26" cy="22" r="15" fill="rgba(255,220,100,0.2)" stroke="#E8A0BF" stroke-width="1.2"/>
</svg>
<div class="foot">
  <span class="handle">@amigadebolso.app</span><span class="num">19/30</span>
</div>
</body>
</html>
