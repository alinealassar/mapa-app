<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=1080"/>
<title>Template Hero Gradient — @amigadebolso.app</title>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Playfair+Display:ital,wght@1,400&display=swap" rel="stylesheet"/>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{width:1080px;height:1350px;overflow:hidden}
  body{font-family:'Quicksand',sans-serif;background:linear-gradient(160deg,#FBE9DD 0%,#F7E1EC 45%,#ECE3F6 100%);display:flex;flex-direction:column;position:relative}
  .strip{height:24px;background:linear-gradient(90deg,#E8A0BF 0%,#B8A9D4 55%,#5BA67D 100%);flex-shrink:0}
  .body{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:80px 96px 48px;gap:0}
  .foot{padding:30px 60px 42px;display:flex;justify-content:space-between;align-items:center}
  .badge{position:absolute;top:48px;right:42px;font-size:27px;font-weight:700;text-transform:uppercase;color:#fff;background:rgba(142,58,107,0.55);backdrop-filter:blur(4px);padding:9px 27px;border-radius:60px}
  .pill{display:inline-block;background:#FFF0F6;color:#8E3A6B;font-size:30px;font-weight:700;padding:12px 39px;border-radius:60px;margin-bottom:42px;text-transform:uppercase;letter-spacing:1.5px}
  .h3{font-family:'Quicksand',sans-serif;font-weight:700;font-size:72px;line-height:1.3;color:#8E3A6B}
  .h2{font-family:'Quicksand',sans-serif;font-weight:700;font-size:96px;line-height:1.2;color:#8E3A6B}
  .sub{font-family:'Quicksand',sans-serif;font-weight:500;font-size:39px;line-height:1.6;color:#4A4458;margin-top:42px}
  .ita{font-family:'Playfair Display',serif;font-style:italic;font-size:48px;line-height:1.5;color:#8E3A6B;margin-top:42px}
  .div{width:108px;height:6px;background:#E8A0BF;border-radius:6px;margin:48px auto}
  .dots{display:flex;gap:15px;margin-top:54px}
  .dot{width:18px;height:18px;border-radius:50%;background:#E8A0BF;opacity:.35}
  .dot.on{opacity:1;width:54px;border-radius:9px}
  .handle{font-size:30px;color:#8B8398;font-weight:500}
  .num{font-size:30px;color:#8B8398;font-weight:700}
  /* sprig top right */
  .botanical{position:absolute;pointer-events:none;top:72px;right:42px}
</style>
</head>
<body>
<div class="strip"></div>
<div class="badge">Single</div>
<div class="body">
  <p class="h2">Você não precisa<br>chegar pronta.</p>
  <div class="div"></div>
  <p class="sub">uma palavra.<br>um áudio de 30 segundos.<br>isso já é suficiente.</p>
  <p class="ita">só aparecer já basta.</p>
</div>
<svg class="botanical" width="120" height="168" viewBox="0 0 40 56" fill="none" style="opacity:.28">
  <path d="M20 54 Q20 36 20 14" stroke="#5BA67D" stroke-width="1.3" stroke-linecap="round"/>
  <path d="M20 42 Q8 32 6 20 Q16 32 20 36" stroke="#5BA67D" stroke-width="1.2" fill="rgba(91,166,125,0.18)" stroke-linecap="round"/>
  <path d="M20 26 Q32 16 34 6 Q24 18 20 22" stroke="#5BA67D" stroke-width="1.2" fill="rgba(91,166,125,0.18)" stroke-linecap="round"/>
  <circle cx="20" cy="10" r="3" fill="rgba(184,169,212,0.35)" stroke="#B8A9D4" stroke-width="1.1"/>
</svg>
<div class="foot">
  <span class="handle">@amigadebolso.app</span><span class="num">09/30</span>
</div>
</body>
</html>
