name: Deploy Edge Functions

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Edge Functions
        run: |
          supabase functions deploy generate-mood-feedback --project-ref hsgotkeydyvrollnzbbf --no-verify-jwt
          supabase functions deploy generate-mapa-insights --project-ref hsgotkeydyvrollnzbbf --no-verify-jwt
          supabase functions deploy generate-weekly-summary --project-ref hsgotkeydyvrollnzbbf --no-verify-jwt
          supabase functions deploy daily-reminder --project-ref hsgotkeydyvrollnzbbf --no-verify-jwt
          supabase functions deploy weekly-summary-reminder --project-ref hsgotkeydyvrollnzbbf --no-verify-jwt
          supabase functions deploy transcribe-audio --project-ref hsgotkeydyvrollnzbbf --no-verify-jwt
          supabase functions deploy onboarding-emails --project-ref hsgotkeydyvrollnzbbf --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
